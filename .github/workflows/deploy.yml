name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Build
        run: npm run build
        env:
          API_URL: http://${{ secrets.TAILSCALE_IP }}:3000
          PAYLOAD_WEBHOOK_SECRET: ${{ secrets.PAYLOAD_WEBHOOK_SECRET }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.DROPLET_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Sync build to Droplet
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
            .next/standalone/ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-frontend/
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
            .next/static/ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-frontend/.next/static/
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
            public/ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-frontend/public/

      - name: Restart PM2
        run: |
          ssh -p ${{ secrets.DROPLET_SSH_PORT }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "API_URL=http://localhost:3000 PAYLOAD_WEBHOOK_SECRET=${{ secrets.PAYLOAD_WEBHOOK_SECRET }} PORT=3001 \
             pm2 restart intelligent-project-frontend --update-env || \
             API_URL=http://localhost:3000 PAYLOAD_WEBHOOK_SECRET=${{ secrets.PAYLOAD_WEBHOOK_SECRET }} PORT=3001 \
             pm2 start /var/www/intelligent-project-frontend/server.js \
             --name intelligent-project-frontend"
